function loadRelated(){
  const o=selOffice();const grid=document.getElementById('rel-grid');if(!grid||!o.market_area)return;
  const la=+o.latitude,lo=+o.longitude;
  const url='dentists?select=name,seo_path,profile_url,city,market_area,accreditation_status,weighted_rating,google_rating,latitude,longitude,slug&market_area=eq.'+encodeURIComponent(o.market_area)+'&limit=300';
  const own=new Set(OFFICES.map(x=>x.slug));
  const ownCity=(o.city||'').toLowerCase();
  api(url).then(rows=>{
    rows=rows.filter(d=>(d.seo_path||d.profile_url)&&!own.has(d.slug));
    rows.forEach(d=>{d._d=(la&&lo&&d.latitude&&d.longitude)?hav(la,lo,+d.latitude,+d.longitude):9999;});
    rows.sort((a,b)=>tierRank(a.accreditation_status)-tierRank(b.accreditation_status)||a._d-b._d||ratingOf(b)-ratingOf(a));
    const seen=new Set(),firstPass=[],backfill=[];
    rows.forEach(d=>{const c=(d.city||'').toLowerCase();if(c&&!seen.has(c)){seen.add(c);firstPass.push(d);}else backfill.push(d);});
    firstPass.sort((a,b)=>((a.city||'').toLowerCase()===ownCity?1:0)-((b.city||'').toLowerCase()===ownCity?1:0));
    const out=firstPass.concat(backfill).slice(0,6);
    if(!out.length){grid.innerHTML='<p class="sub" style="grid-column:1/-1">No other dentists found in this market yet.</p>';return;}
    grid.innerHTML=out.map(d=>{const prof=d.seo_path||d.profile_url;const r=ratingOf(d);
      return '<a class="rel-card" href="'+H(prof)+'"><span class="rel-av">'+initials(d.name)+'</span><span class="rel-txt"><span class="rel-n">'+H(d.name)+'</span><span class="rel-m">'+H(d.city||'')+(d.accreditation_status?' · '+H(d.accreditation_status):'')+(r?' · ★ '+r.toFixed(1):'')+'</span></span></a>';}).join('');
  }).catch(()=>{grid.innerHTML='<p class="sub" style="grid-column:1/-1">Dentists in this market are unavailable right now.</p>';});
}

function injectSchema(){
  if(typeof document!=='undefined'&&document.getElementById('ssr-ld'))return;
  const prim=OFFICES[0]||{};const pid=ORIGIN+'/dentists/'+PROV.slug+'/#person';
  const g=[{"@type":["Physician","Dentist"],"@id":pid,"name":'Dr. '+String(PROV.name||'').replace(/^Dr\.?\s*/i,''),"jobTitle":"Dentist","medicalSpecialty":"Dentistry","knowsAbout":PROV.specialties||[],"url":ORIGIN+'/dentists/__STATE__/'+PROV.slug+'/'}];
  if(PROV.degree)g[0].hasCredential={"@type":"EducationalOccupationalCredential","credentialCategory":"degree","name":PROV.degree};
  if(PROV.dental_school)g[0].alumniOf={"@type":"CollegeOrUniversity","name":PROV.dental_school};
  if(PROV.sameas&&PROV.sameas.length)g[0].sameAs=PROV.sameas;
  if(PROV.languages&&PROV.languages.length)g[0].knowsLanguage=PROV.languages;
  g[0].workLocation=OFFICES.map(o=>({"@id":ORIGIN+o.seo_path+"#office"}));
  OFFICES.forEach(o=>{
    const node={"@type":["Dentist","LocalBusiness"],"@id":ORIGIN+o.seo_path+"#office","name":o.name,"url":ORIGIN+o.seo_path,"address":o.address,"employee":{"@id":pid}};
    if(o.phone)node.telephone=o.phone;
    if(o.latitude)node.geo={"@type":"GeoCoordinates","latitude":+o.latitude,"longitude":+o.longitude};
    const r=ratingOf(o),c=countOf(o);if(r>0&&c>0)node.aggregateRating={"@type":"AggregateRating","ratingValue":String(r),"reviewCount":String(c)};
    g.push(node);
  });
  const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify({"@context":"https://schema.org","@graph":g});document.head.appendChild(s);
}

window.submitVerify=function(e){
  e.preventDefault();
  const f=e.target,res=document.getElementById('vfresult'),o=selOffice();
  const v=n=>(f.elements[n]&&f.elements[n].value||'').trim();
  const payload={type:'ppo_verification',provider:PROV.name,provider_slug:PROVIDER,office:o.name,office_slug:o.slug,
    ppo_carrier:v('carrier'),plan_name:v('plan'),patient_name:v('pname'),patient_email:v('pemail'),patient_phone:v('pphone'),
    message:v('message'),member_id_provided:false,source_page_url:location.href};
  res.className='vfresult';res.textContent='Sending…';
  fetch(SUPA+'/functions/v1/book-request',{method:'POST',headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+KEY},body:JSON.stringify(payload)})
    .then(r=>{if(!r.ok)throw new Error('status '+r.status);return r.json().catch(()=>({}));})
    .then(()=>{res.className='vfresult ok';res.innerHTML='✓ Request sent. CoverCapy will follow up at <b>'+H(v('pemail'))+'</b> about your coverage at '+H(o.name)+'.';const b=f.querySelector('button[type=submit]');if(b){b.disabled=true;b.textContent='Sent';}})
    .catch(()=>{const subj=encodeURIComponent('PPO coverage check, '+o.name);const body=encodeURIComponent('Carrier: '+v('carrier')+'\nPlan: '+v('plan')+'\nName: '+v('pname')+'\nEmail: '+v('pemail')+'\nPhone: '+v('pphone')+'\nOffice: '+o.name+' ('+(o.seo_path||'')+')'+'\n\n'+v('message'));res.className='vfresult warn';res.innerHTML='Couldn\'t submit automatically right now. <a href="mailto:hello@covercapy.com?subject='+subj+'&body='+body+'">Open this as an email instead</a>';});
  return false;
};

let _obs=null;
function bindScrollspy(){
  if(_obs)_obs.disconnect();
  const links=[...document.querySelectorAll('.section-nav a')],secs=links.map(a=>document.querySelector(a.getAttribute('href'))).filter(Boolean);
  _obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){const id='#'+e.target.id;links.forEach(a=>a.classList.toggle('active',a.getAttribute('href')===id));}}),{rootMargin:'-90px 0px -68% 0px'});
  secs.forEach(s=>_obs.observe(s));
}
