<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CoverCapy | The concierge layer for PPO dentistry</title>
  <meta name="description" content="CoverCapy is the concierge layer for PPO dentistry. Compare PPO plans, estimate treatment costs, and find trusted in-network dentists before you book." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,30..100,0..1;1,9..144,300..700,30..100,0..1&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Correct paths for your GitHub repo -->
  <link rel="stylesheet" href="/css/mega-nav.css" />
  <link rel="stylesheet" href="/css/hero-slider.css" />

  <style>
    :root {
      --warm-cream: #FBF6EC;
      --ink: #182A34;
      --ink-mid: #526D76;
      --g: #2E7D76;
      --gd: #123F52;
      --ff-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--warm-cream);
      color: var(--ink);
      font-family: var(--ff-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hero-slider-shell {
      width: 100%;
      margin: 0 auto;
    }

    .index-intro {
      padding: 96px 0 120px;
      max-width: 760px;
    }

    .index-intro .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--g);
      margin: 0 0 18px;
    }

    .index-intro h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: clamp(40px, 5.6vw, 68px);
      line-height: 1.04;
      letter-spacing: -.025em;
      color: var(--gd);
      margin: 0 0 24px;
    }

    .index-intro p {
      font-size: 18px;
      line-height: 1.6;
      color: var(--ink-mid);
      margin: 0;
      max-width: 620px;
    }
  </style>

  <!-- Correct JS paths for your repo -->
  <script src="/js/mega-nav.js" defer></script>
  <script src="/js/load-nav.js" defer></script>
  <script src="/js/hero-slider.js" defer></script>
</head>

<body>

  <!-- Mega nav loads here from /components/mega-nav.html -->
  <div id="mega-nav-placeholder"></div>

  <main class="page-shell">

    <!-- Hero slider loads here -->
    <section class="hero-slider-shell" aria-label="CoverCapy hero slider">
      <div id="hero-slider-placeholder"></div>
    </section>

    <section class="index-intro">
      <p class="eyebrow">CoverCapy Concierge</p>
      <h1>The concierge layer for PPO dentistry</h1>
      <p>
        Compare PPO coverage, estimate treatment costs, and find trusted
        in-network dentists before you book.
      </p>
    </section>

  </main>

</body>
</html>
