<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoverCapy</title>

  <!-- Component CSS first, so styles are ready when HTML injects -->
  <link rel="stylesheet" href="assets/css/mega-nav.css">
  <link rel="stylesheet" href="assets/css/hero-slider.css">
</head>
<body>

  <!-- 1. Mega nav goes here — load-nav.js fills this -->
  <div id="mega-nav-placeholder"></div>

  <!-- 2. Hero right after the nav -->
  <div id="hero-slider-placeholder"></div>

  <!-- ...rest of your page below... -->

  <!-- Component JS at end of body, deferred so DOM is ready -->
  <script src="assets/js/load-nav.js" defer></script>
  <script src="assets/js/mega-nav.js" defer></script>
  <script src="assets/js/hero-slider.js" defer></script>
</body>
</html>
