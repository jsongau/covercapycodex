<body>

<div id="cc-nav-mount"></div>
<div id="cc-hero-mount"></div>

<script>
(async function(){
  const loadScript = src => new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload  = resolve;
    s.onerror = () => reject(new Error('Failed to load ' + src));
    document.body.appendChild(s);
  });

  const injectComponent = async (mountId, url) => {
    const mount = document.getElementById(mountId);
    if (!mount) return;
    try {
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) throw new Error(url + ' returned ' + res.status);
      mount.outerHTML = await res.text();
    } catch (err) {
      console.error('[loader] failed:', url, err);
    }
  };

  await injectComponent('cc-nav-mount',  'components/mega-nav.html');
  await injectComponent('cc-hero-mount', 'components/hero-slider.html');

  await loadScript('assets/js/mega-nav.js');
  await loadScript('assets/js/hero-slider.js');
})();
</script>
