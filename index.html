<!-- Minimal page-shell styles (mount points use no chrome) -->
<style>

  /* Skeleton placeholders while components load */

</style>

<body>

<!-- ════════════════════════════════════════════════════════════════
     MEGA NAV MOUNT POINT
     Loaded from components/mega-nav.html by the loader script below.
     ════════════════════════════════════════════════════════════════ -->
<div id="cc-nav-mount"></div>

<!-- ════════════════════════════════════════════════════════════════
     HERO SLIDER MOUNT POINT
     Loaded from components/hero-slider.html by the loader script below.
     ════════════════════════════════════════════════════════════════ -->
<div id="cc-hero-mount"></div>

<!-- ════════════════════════════════════════════════════════════════
     COMPONENT LOADER
     Fetches mega-nav.html and hero-slider.html in parallel, injects
     them into their mount points, then loads the interaction scripts
     (mega-nav.js, hero-slider.js) so they find the DOM elements they
     need.
     ════════════════════════════════════════════════════════════════ -->
<script>
(async function(){
  const loadScript = src => new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload  = resolve;
    s.onerror = () => reject(new Error('Failed to load ' + src));
    document.body.appendChild(s);
  });

  const injectComponent = async (mountId, url) => {
    const mount = document.getElementById(mountId);
    if (!mount) return;
    try {
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) throw new Error(url + ' returned ' + res.status);
      const html = await res.text();
      mount.outerHTML = html;
    } catch (err) {
      console.error('Component load failed for', url, err);
      mount.innerHTML = '<!-- Component failed to load: ' + url + ' -->';
    }
  };

  try {
    // Inject both components (nav first so it's painted on top of the page)
    await injectComponent('cc-nav-mount',  'components/mega-nav.html');
    await injectComponent('cc-hero-mount', 'components/hero-slider.html');

    // Now load interaction JS — DOM elements exist at this point
    await loadScript('assets/js/mega-nav.js');
    await loadScript('assets/js/hero-slider.js');
  } catch (err) {
    console.error('Page bootstrap failed:', err);
  }
})();
</script>

</body>
