<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>
    CoverCapy | PPO Dental Insurance, Cost Estimates & PPO Dentist Discovery
  </title>

  <meta
    name="description"
    content="CoverCapy helps patients compare PPO dental plans, estimate treatment costs, and find PPO-friendly dentists before booking care."
  />

  <meta name="robots" content="index, follow" />

  <!-- MEGA NAV CSS -->
  <link rel="stylesheet" href="/assets/css/mega-nav.css">

  <!-- HERO SLIDER CSS -->
  <link rel="stylesheet" href="/assets/css/hero-slider.css">

  <style>
    body{
      margin:0;
      background:#faf8f4;
      overflow-x:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    #site-nav{
      position:relative;
      z-index:9999;
    }

    #hero-slider{
      position:relative;
      z-index:1;
    }
  </style>
</head>

<body>

  <!-- MEGA NAV -->
  <div id="site-nav"></div>

  <!-- HERO SLIDER -->
  <div id="hero-slider"></div>

  <!-- LOAD MEGA NAV -->
  <script>
    fetch('/components/mega-nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('site-nav').innerHTML = html;

        const navScript = document.createElement('script');
        navScript.src = '/assets/js/mega-nav.js?v=' + Date.now();
        document.body.appendChild(navScript);
      })
      .catch(err => console.error('Mega nav failed:', err));
  </script>

  <!-- LOAD HERO SLIDER -->
  <script>
    fetch('/components/hero-slider.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('hero-slider').innerHTML = html;

        const heroScript = document.createElement('script');
        heroScript.src = '/assets/js/hero-slider.js?v=' + Date.now();
        document.body.appendChild(heroScript);
      })
      .catch(err => console.error('Hero slider failed:', err));
  </script>

</body>
</html>
